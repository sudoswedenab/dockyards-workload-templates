      spec: input: #Input
    }
    gitRepository: GITREPOSITORY.#x & {
      apiVersion: "source.toolkit.fluxcd.io/v1"
      kind:       GITREPOSITORYKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval: "60m"
        url:      #workload.spec.input.url
        ref: tag: #workload.spec.input.tag
      }
    }
    _service: SERVICE.#x & {
      {
        apiVersion: "v1"
        kind:       "Service"
        metadata: {
          if #workload.spec.input.service.annotations != _|_ // explicit error (_|_ literal) in source
          {
            annotations: #workload.spec.input.service.annotations
          }
          name: "ingress-nginx-controller"
        }
        if #workload.spec.input.service.loadBalancerIP != _|_ // explicit error (_|_ literal) in source
        {
          spec: loadBalancerIP: #workload.spec.input.service.loadBalancerIP
        }
      }
    }
    _patches: [
      if #workload.spec.input.service != _|_ // explicit error (_|_ literal) in source
      {
        patch: "\(yaml.Marshal(_service))"
        target: {
          kind: "Service"
          name: "ingress-nginx-controller"
        }
      }, {
        patch: """
          - op: replace
            path: /kind
            value: "DaemonSet"
          """
        target: {
          kind:          "Deployment"
          labelSelector: "app.kubernetes.io/component=controller"
        }
      },
      if #workload.spec.input.enableSSLPassThrough {
        patch: """
          - op: add
            path: /spec/template/spec/containers/0/args/-
            value: "--enable-ssl-passthrough=true"
          """
        target: {
          kind:          "DaemonSet"
          labelSelector: "app.kubernetes.io/component=controller"
        }
      },
      if #workload.spec.input.isDefaultClass {
        patch: """
          - op: add
            path: /metadata/annotations/ingressclass.kubernetes.io~1is-default-class
            value: "true"
          """
        target: {
          kind: "IngressClass"
          name: "nginx"
        }
      }]
    kustomization: KUSTOMIZATION.#x & {
      apiVersion: "kustomize.toolkit.fluxcd.io/v1"
      kind:       KUSTOMIZATIONKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        force:    true
        interval: "15m"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        patches:       _patches
        prune:         true
        path:          #workload.spec.input.path
        retryInterval: "60s"
        sourceRef: {
          kind: gitRepository.kind
          name: gitRepository.metadata.name
        }
        targetNamespace: #workload.spec.targetNamespace
        wait:            true
        commonMetadata: labels: "dockyards.io/workload-name": #workload.metadata.name
      }
    }

