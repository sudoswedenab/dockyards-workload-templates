apiVersion: dockyards.io/v1alpha3
kind: WorkloadTemplate
metadata:
  name: cloud-provider-for-cloud-director
spec:
  source: |
    package template

    import (
      "encoding/yaml"
      "encoding/base64"
    )

    #Input: {
      host!:                        =~"^https://.*$"
      org!:                         string
      vdc!:                         string
      enableVirtualServiceSharedIP: bool | *true
      network!:                     string
      vAppName!:                    string
      clusterID!:                   string
      apiToken!:                    string
    }
    #cluster: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        version?:                  string @go(Version)
        noDefaultIngressProvider?: bool   @go(NoDefaultIngressProvider)
        upgrades?: [...{
          to: string @go(To)
        }] @go(Upgrades,[]ClusterUpgrade)
        blockDeletion?:          bool                                @go(BlockDeletion)
        allocateInternalIP?:     bool                                @go(AllocateInternalIP)
        ipPoolRef?:              null | TYPEDLOCALOBJECTREFERENCE.#x @go(IPPoolRef,*corev1.TypedLocalObjectReference)
        duration?:               null | DURATION.#x                  @go(Duration,*metav1.Duration)
        noDefaultNetworkPlugin?: bool                                @go(NoDefaultNetworkPlugin)
        podSubnets?: [...string] @go(PodSubnets,[]string)
        serviceSubnets?: [...string] @go(ServiceSubnets,[]string)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        clusterServiceID?: string @go(ClusterServiceID)
        version?:          string @go(Version)
        dnsZones?: [...string] @go(DNSZones,[]string)
        apiEndpoint?: {
          host: string @go(Host)
          port: int32  @go(Port)
        } @go(APIEndpoint)
        expirationTimestamp?: null | TIME.#x @go(ExpirationTimestamp,*metav1.Time)
      } @go(Status)
    }
    #workload: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        clusterComponent?:      bool                           @go(ClusterComponent)
        targetNamespace:        string                         @go(TargetNamespace)
        workloadTemplateInput?: null | JSON.#x                 @go(WorkloadTemplateInput,*apiextensionsv1.JSON)
        input?:                 null | JSON.#x                 @go(Input,*apiextensionsv1.JSON)
        workloadTemplateRef?:   null | TYPEDOBJECTREFERENCE.#x @go(WorkloadTemplateRef,*corev1.TypedObjectReference)
        provenience:            string                         @go(Provenience)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        dependencyRefs?: [...TYPEDLOCALOBJECTREFERENCE.#x] @go(DependencyRefs,[]corev1.TypedLocalObjectReference)
        urls?: [...string] @go(URLs,[]string)
        references?: [...{
          TYPEDOBJECTREFERENCE.#x
          parent?: null | TYPEDLOCALOBJECTREFERENCE.#x @go(Parent,*corev1.TypedLocalObjectReference)
          urls?: [...string] @go(URLs,[]string)
        }] @go(References,[]WorkloadReference)
      } @go(Status)
    } & {
      spec: input: #Input
    }
    _config: {
      vcd: {
        host: #workload.spec.input.host
        org:  #workload.spec.input.org
        vdc:  #workload.spec.input.vdc
      }
      loadbalancer: {
        enableVirtualServiceSharedIP: #workload.spec.input.enableVirtualServiceSharedIP
        network:                      #workload.spec.input.network
      }
      vAppName:  #workload.spec.input.vAppName
      clusterid: "NO_RDE_\(#workload.spec.input.clusterID)"
    }
    _configMap: CONFIGMAP.#x & {
      apiVersion: "v1"
      kind:       "ConfigMap"
      metadata: {
        name:      "vcloud-ccm-configmap"
        namespace: #workload.spec.targetNamespace
      }
      data: "vcloud-ccm-config.yaml": "\(yaml.Marshal(_config))"
    }
    _secret: SECRET.#x & {
      apiVersion: "v1"
      kind:       "Secret"
      metadata: {
        name:      "vcloud-basic-auth"
        namespace: #workload.spec.targetNamespace
      }
      data: refreshToken: '\(base64.Encode(null, #workload.spec.input.apiToken))'
    }
    _kustomization: KUSTOMIZATION.#x & {
      apiVersion: KUSTOMIZATIONVERSION.#x
      kind:       KUSTOMIZATIONKIND.#x
      resources: ["https://raw.githubusercontent.com/vmware/cloud-provider-for-cloud-director/refs/tags/1.6.1/manifests/cloud-director-ccm.yaml", "configmap.yaml", "secret.yaml"]
    }
    worktree: WORKTREE.#x & {
      apiVersion: "dockyards.io/v1alpha3"
      kind:       WORKTREEKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: files: {
        "configmap.yaml":     '\(yaml.Marshal(_configMap))'
        "secret.yaml":        '\(yaml.Marshal(_secret))'
        "kustomization.yaml": '\(yaml.Marshal(_kustomization))'
      }
    }
    kustomization: KUSTOMIZATION_1.#x & {
      apiVersion: "kustomize.toolkit.fluxcd.io/v1"
      kind:       KUSTOMIZATIONKIND_1.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval: "15m"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        prune:         true
        retryInterval: "30s"
        sourceRef: {
          kind: GITREPOSITORYKIND.#x
          name: #workload.metadata.name
        }
        wait: true
      }
    }

