apiVersion: dockyards.io/v1alpha3
kind: WorkloadTemplate
metadata:
  name: rbac
spec:
  source: |
    package template

    import (
      "strings"
      "encoding/yaml"
    )

    #RoleBinding: {
      bindingName: string
      roleRef:     ROLEREF.#x
      subjects: [...SUBJECT.#x]
      namespace: string
    }
    #Input: {
      clusterRoleBindings: [...#RoleBinding] | *[]
      roleBindings: [...#RoleBinding] | *[]
    }
    #cluster: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        version?:                  string @go(Version)
        noDefaultIngressProvider?: bool   @go(NoDefaultIngressProvider)
        upgrades?: [...{
          to: string @go(To)
        }] @go(Upgrades,[]ClusterUpgrade)
        blockDeletion?:          bool                                @go(BlockDeletion)
        allocateInternalIP?:     bool                                @go(AllocateInternalIP)
        ipPoolRef?:              null | TYPEDLOCALOBJECTREFERENCE.#x @go(IPPoolRef,*corev1.TypedLocalObjectReference)
        duration?:               null | DURATION.#x                  @go(Duration,*metav1.Duration)
        noDefaultNetworkPlugin?: bool                                @go(NoDefaultNetworkPlugin)
        podSubnets?: [...string] @go(PodSubnets,[]string)
        serviceSubnets?: [...string] @go(ServiceSubnets,[]string)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        clusterServiceID?: string @go(ClusterServiceID)
        version?:          string @go(Version)
        dnsZones?: [...string] @go(DNSZones,[]string)
        apiEndpoint?: {
          host: string @go(Host)
          port: int32  @go(Port)
        } @go(APIEndpoint)
        expirationTimestamp?: null | TIME.#x @go(ExpirationTimestamp,*metav1.Time)
      } @go(Status)
    }
    #workload: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        clusterComponent?:      bool                           @go(ClusterComponent)
        targetNamespace:        string                         @go(TargetNamespace)
        workloadTemplateInput?: null | JSON.#x                 @go(WorkloadTemplateInput,*apiextensionsv1.JSON)
        input?:                 null | JSON.#x                 @go(Input,*apiextensionsv1.JSON)
        workloadTemplateRef?:   null | TYPEDOBJECTREFERENCE.#x @go(WorkloadTemplateRef,*corev1.TypedObjectReference)
        provenience:            string                         @go(Provenience)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        dependencyRefs?: [...TYPEDLOCALOBJECTREFERENCE.#x] @go(DependencyRefs,[]corev1.TypedLocalObjectReference)
        urls?: [...string] @go(URLs,[]string)
        references?: [...{
          TYPEDOBJECTREFERENCE.#x
          parent?: null | TYPEDLOCALOBJECTREFERENCE.#x @go(Parent,*corev1.TypedLocalObjectReference)
          urls?: [...string] @go(URLs,[]string)
        }] @go(References,[]WorkloadReference)
      } @go(Status)
    } & {
      spec: input: #Input
    }
    _clusterRoleBindingList: [
      for clusterRoleBinding in #workload.spec.input.clusterRoleBindings {
        CLUSTERROLEBINDING.#x
        apiVersion: "rbac.authorization.k8s.io/v1"
        kind:       "ClusterRoleBinding"
        metadata: name: clusterRoleBinding.bindingName
        roleRef:  clusterRoleBinding.roleRef
        subjects: clusterRoleBinding.subjects
      }]
    _roleBindingList: [
      for roleBinding in #workload.spec.input.roleBindings {
        apiVersion: "rbac.authorization.k8s.io/v1"
        kind:       "RoleBinding"
        metadata: {
          name:      roleBinding.bindingName
          namespace: roleBinding.namespace
        }
        roleRef:  roleBinding.roleRef
        subjects: roleBinding.subjects
      }]
    worktree: WORKTREE.#x & {
      apiVersion: "dockyards.io/v1alpha3"
      kind:       WORKTREEKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: files: {
        if _clusterRoleBindingList != [] {
          "clusterrolebindings.yaml": '\(strings.Join([
                                      for clusterRoleBinding in _clusterRoleBindingList {
              "\(yaml.Marshal(clusterRoleBinding))"
            }], """

            ---

            """))'
        }
        if _roleBindingList != [] {
          "rolebindings.yaml": '\(strings.Join([
                                for roleBinding in _roleBindingList {
              "\(yaml.Marshal(roleBinding))"
            }], """

            ---

            """))'
        }
      }
    }
    kustomization: KUSTOMIZATION.#x & {
      apiVersion: "kustomize.toolkit.fluxcd.io/v1"
      kind:       KUSTOMIZATIONKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval:      "1m"
        wait:          true
        retryInterval: "15s"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        targetNamespace: #workload.spec.targetNamespace
        prune:           true
        sourceRef: {
          kind: GITREPOSITORYKIND.#x
          name: #workload.metadata.name
        }
      }
    }

    //cue:path: "k8s.io/api/rbac/v1".#RoleRef
    let ROLEREF = {
      #x: {
        apiGroup: string @go(APIGroup) @protobuf(1,bytes,opt)
        kind:     string @go(Kind) @protobuf(2,bytes,opt)
        name:     string @go(Name) @protobuf(3,bytes,opt)
      }
    }

    //cue:path: "k8s.io/api/rbac/v1".#Subject
    let SUBJECT = {
      #x: {
        kind:       string @go(Kind) @protobuf(1,bytes,opt)
        apiGroup?:  string @go(APIGroup) @protobuf(2,bytes,opt)
        name:       string @go(Name) @protobuf(3,bytes,opt)
        namespace?: string @go(Namespace) @protobuf(4,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#TypeMeta
    let TYPEMETA = {
      #x: {
        kind?:       string @go(Kind) @protobuf(1,bytes,opt)
        apiVersion?: string @go(APIVersion) @protobuf(2,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ObjectMeta
    let OBJECTMETA = {
      #x: {
        name?:                       string  @go(Name) @protobuf(1,bytes,opt)
        generateName?:               string  @go(GenerateName) @protobuf(2,bytes,opt)
        namespace?:                  string  @go(Namespace) @protobuf(3,bytes,opt)
        selfLink?:                   string  @go(SelfLink) @protobuf(4,bytes,opt)
        uid?:                        UID.#x  @go(UID) @protobuf(5,bytes,opt,casttype=k8s.io/kubernetes/pkg/types.UID)
        resourceVersion?:            string  @go(ResourceVersion) @protobuf(6,bytes,opt)
        generation?:                 int64   @go(Generation) @protobuf(7,varint,opt)
        creationTimestamp?:          TIME.#x @go(CreationTimestamp) @protobuf(8,bytes,opt)
        deletionTimestamp?:          TIME.#x @go(DeletionTimestamp,*Time) @protobuf(9,bytes,opt)
        deletionGracePeriodSeconds?: int64   @go(DeletionGracePeriodSeconds,*int64) @protobuf(10,varint,opt)
        labels?: {
          [string]: string
        } @go(Labels,map[string]string) @protobuf(11,bytes,rep)
        annotations?: {
          [string]: string
        } @go(Annotations,map[string]string) @protobuf(12,bytes,rep)
        ownerReferences?: [...OWNERREFERENCE.#x] @go(OwnerReferences,[]OwnerReference) @protobuf(13,bytes,rep)
        finalizers?: [...string] @go(Finalizers,[]string) @protobuf(14,bytes,rep)
        managedFields?: [...MANAGEDFIELDSENTRY.#x] @go(ManagedFields,[]ManagedFieldsEntry) @protobuf(17,bytes,rep)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/types".#UID
    let UID = {
      #x: string
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#Time
    let TIME = {
      #x: _
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#OwnerReference
    let OWNERREFERENCE = {
      #x: {
        apiVersion:          string @go(APIVersion) @protobuf(5,bytes,opt)
        kind:                string @go(Kind) @protobuf(1,bytes,opt)
        name:                string @go(Name) @protobuf(3,bytes,opt)
        uid:                 UID.#x @go(UID) @protobuf(4,bytes,opt,casttype=k8s.io/apimachinery/pkg/types.UID)
        controller?:         bool   @go(Controller,*bool) @protobuf(6,varint,opt)
        blockOwnerDeletion?: bool   @go(BlockOwnerDeletion,*bool) @protobuf(7,varint,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ManagedFieldsEntry
    let MANAGEDFIELDSENTRY = {
      #x: {
        manager?:     string                        @go(Manager) @protobuf(1,bytes,opt)
        operation?:   MANAGEDFIELDSOPERATIONTYPE.#x @go(Operation) @protobuf(2,bytes,opt,casttype=ManagedFieldsOperationType)
        apiVersion?:  string                        @go(APIVersion) @protobuf(3,bytes,opt)
        time?:        TIME.#x                       @go(Time,*Time) @protobuf(4,bytes,opt)
        fieldsType?:  string                        @go(FieldsType) @protobuf(6,bytes,opt)
        fieldsV1?:    FIELDSV1.#x                   @go(FieldsV1,*FieldsV1) @protobuf(7,bytes,opt)
        subresource?: string                        @go(Subresource) @protobuf(8,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ManagedFieldsOperationType
    let MANAGEDFIELDSOPERATIONTYPE = {
      #x: string
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#FieldsV1
    let FIELDSV1 = {
      #x: _
    }

    //cue:path: "k8s.io/api/core/v1".#TypedLocalObjectReference
    let TYPEDLOCALOBJECTREFERENCE = {
      #x: {
        apiGroup?: null | string @go(APIGroup,*string) @protobuf(1,bytes,opt)
        kind:      string        @go(Kind) @protobuf(2,bytes,opt)
        name:      string        @go(Name) @protobuf(3,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#Duration
    let DURATION = {
      #x: _
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#Condition
    let CONDITION = {
      #x: {
        type:                string             @go(Type) @protobuf(1,bytes,opt)
        status:              CONDITIONSTATUS.#x @go(Status) @protobuf(2,bytes,opt)
        observedGeneration?: int64              @go(ObservedGeneration) @protobuf(3,varint,opt)
        lastTransitionTime:  TIME.#x            @go(LastTransitionTime) @protobuf(4,bytes,opt)
        reason:              string             @go(Reason) @protobuf(5,bytes,opt)
        message:             string             @go(Message) @protobuf(6,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ConditionStatus
    let CONDITIONSTATUS = {
      #x: string
    }

    //cue:path: "k8s.io/apiextensions-apiserver/pkg/apis/apiextensions/v1".#JSON
    let JSON = {
      #x: _
    }

    //cue:path: "k8s.io/api/core/v1".#TypedObjectReference
    let TYPEDOBJECTREFERENCE = {
      #x: {
        apiGroup?:  null | string @go(APIGroup,*string) @protobuf(1,bytes,opt)
        kind:       string        @go(Kind) @protobuf(2,bytes,opt)
        name:       string        @go(Name) @protobuf(3,bytes,opt)
        namespace?: null | string @go(Namespace,*string) @protobuf(4,bytes,opt)
      }
    }

    //cue:path: "k8s.io/api/rbac/v1".#ClusterRoleBinding
    let CLUSTERROLEBINDING = {
      #x: {
        TYPEMETA.#x
        metadata?: OBJECTMETA.#x @go(ObjectMeta) @protobuf(1,bytes,opt)
        subjects?: [...SUBJECT.#x] @go(Subjects,[]Subject) @protobuf(2,bytes,rep)
        roleRef: ROLEREF.#x @go(RoleRef) @protobuf(3,bytes,opt)
      }
    }

    //cue:path: "github.com/sudoswedenab/dockyards-backend/api/v1alpha3".#Worktree
    let WORKTREE = {
      #x: {
        TYPEMETA.#x
        metadata?: OBJECTMETA.#x     @go(ObjectMeta)
        spec?:     WORKTREESPEC.#x   @go(Spec)
        status?:   WORKTREESTATUS.#x @go(Status)
      }
    }

    //cue:path: "github.com/sudoswedenab/dockyards-backend/api/v1alpha3".#WorktreeSpec
    let WORKTREESPEC = {
      #x: {
        files?: {
          [string]: bytes
        } @go(Files,map[string][]byte)
      }
    }

    //cue:path: "github.com/sudoswedenab/dockyards-backend/api/v1alpha3".#WorktreeStatus
    let WORKTREESTATUS = {
      #x: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        url?:           null | string @go(URL,*string)
        referenceName?: null | string @go(ReferenceName,*string)
        commitHash?:    null | string @go(CommitHash,*string)
      }
    }

    //cue:path: "github.com/sudoswedenab/dockyards-backend/api/v1alpha3".#WorktreeKind
    let WORKTREEKIND = {
      #x: "Worktree"
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#Kustomization
    let KUSTOMIZATION = {
      #x: {
        TYPEMETA.#x
        metadata?: OBJECTMETA.#x          @go(ObjectMeta)
        spec?:     KUSTOMIZATIONSPEC.#x   @go(Spec)
        status?:   KUSTOMIZATIONSTATUS.#x @go(Status)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#KustomizationSpec
    let KUSTOMIZATIONSPEC = {
      #x: {
        commonMetadata?: null | COMMONMETADATA.#x @go(CommonMetadata,*CommonMetadata)
        dependsOn?: [...NAMESPACEDOBJECTREFERENCE.#x] @go(DependsOn,[]meta.NamespacedObjectReference)
        decryption?:    null | DECRYPTION.#x          @go(Decryption,*Decryption)
        interval:       DURATION.#x                   @go(Interval)
        retryInterval?: null | DURATION.#x            @go(RetryInterval,*metav1.Duration)
        kubeConfig?:    null | KUBECONFIGREFERENCE.#x @go(KubeConfig,*meta.KubeConfigReference)
        path?:          string                        @go(Path)
        postBuild?:     null | POSTBUILD.#x           @go(PostBuild,*PostBuild)
        prune:          bool                          @go(Prune)
        healthChecks?: [...NAMESPACEDOBJECTKINDREFERENCE.#x] @go(HealthChecks,[]meta.NamespacedObjectKindReference)
        namePrefix?: string @go(NamePrefix)
        nameSuffix?: string @go(NameSuffix)
        patches?: [...PATCH.#x] @go(Patches,[]kustomize.Patch)
        images?: [...IMAGE.#x] @go(Images,[]kustomize.Image)
        serviceAccountName?: string                           @go(ServiceAccountName)
        sourceRef:           CROSSNAMESPACESOURCEREFERENCE.#x @go(SourceRef)
        suspend?:            bool                             @go(Suspend)
        targetNamespace?:    string                           @go(TargetNamespace)
        timeout?:            null | DURATION.#x               @go(Timeout,*metav1.Duration)
        force?:              bool                             @go(Force)
        wait?:               bool                             @go(Wait)
        components?: [...string] @go(Components,[]string)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#CommonMetadata
    let COMMONMETADATA = {
      #x: {
        annotations?: {
          [string]: string
        } @go(Annotations,map[string]string)
        labels?: {
          [string]: string
        } @go(Labels,map[string]string)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/meta".#NamespacedObjectReference
    let NAMESPACEDOBJECTREFERENCE = {
      #x: {
        name:       string @go(Name)
        namespace?: string @go(Namespace)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#Decryption
    let DECRYPTION = {
      #x: {
        provider:   string                         @go(Provider)
        secretRef?: null | LOCALOBJECTREFERENCE.#x @go(SecretRef,*meta.LocalObjectReference)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/meta".#LocalObjectReference
    let LOCALOBJECTREFERENCE = {
      #x: {
        name: string @go(Name)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/meta".#KubeConfigReference
    let KUBECONFIGREFERENCE = {
      #x: {
        configMapRef?: null | LOCALOBJECTREFERENCE.#x @go(ConfigMapRef,*LocalObjectReference)
        secretRef?:    null | SECRETKEYREFERENCE.#x   @go(SecretRef,*SecretKeyReference)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/meta".#SecretKeyReference
    let SECRETKEYREFERENCE = {
      #x: {
        name: string @go(Name)
        key?: string @go(Key)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#PostBuild
    let POSTBUILD = {
      #x: {
        substitute?: {
          [string]: string
        } @go(Substitute,map[string]string)
        substituteFrom?: [...SUBSTITUTEREFERENCE.#x] @go(SubstituteFrom,[]SubstituteReference)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#SubstituteReference
    let SUBSTITUTEREFERENCE = {
      #x: {
        kind:      string @go(Kind)
        name:      string @go(Name)
        optional?: bool   @go(Optional)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/meta".#NamespacedObjectKindReference
    let NAMESPACEDOBJECTKINDREFERENCE = {
      #x: {
        apiVersion?: string @go(APIVersion)
        kind:        string @go(Kind)
        name:        string @go(Name)
        namespace?:  string @go(Namespace)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/kustomize".#Patch
    let PATCH = {
      #x: {
        patch:   string             @go(Patch)
        target?: null | SELECTOR.#x @go(Target,*Selector)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/kustomize".#Selector
    let SELECTOR = {
      #x: {
        group?:              string @go(Group)
        version?:            string @go(Version)
        kind?:               string @go(Kind)
        namespace?:          string @go(Namespace)
        name?:               string @go(Name)
        annotationSelector?: string @go(AnnotationSelector)
        labelSelector?:      string @go(LabelSelector)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/kustomize".#Image
    let IMAGE = {
      #x: {
        name:     string @go(Name)
        newName?: string @go(NewName)
        newTag?:  string @go(NewTag)
        digest?:  string @go(Digest)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#CrossNamespaceSourceReference
    let CROSSNAMESPACESOURCEREFERENCE = {
      #x: {
        apiVersion?: string @go(APIVersion)
        kind:        string @go(Kind)
        name:        string @go(Name)
        namespace?:  string @go(Namespace)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#KustomizationStatus
    let KUSTOMIZATIONSTATUS = {
      #x: {
        RECONCILEREQUESTSTATUS.#x
        observedGeneration?: int64 @go(ObservedGeneration)
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        lastAppliedRevision?:   string                      @go(LastAppliedRevision)
        lastAttemptedRevision?: string                      @go(LastAttemptedRevision)
        inventory?:             null | RESOURCEINVENTORY.#x @go(Inventory,*ResourceInventory)
      }
    }

    //cue:path: "github.com/fluxcd/pkg/apis/meta".#ReconcileRequestStatus
    let RECONCILEREQUESTSTATUS = {
      #x: {
        lastHandledReconcileAt?: string @go(LastHandledReconcileAt)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#ResourceInventory
    let RESOURCEINVENTORY = {
      #x: {
        entries: [...RESOURCEREF.#x] @go(Entries,[]ResourceRef)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#ResourceRef
    let RESOURCEREF = {
      #x: {
        id: string @go(ID)
        v:  string @go(Version)
      }
    }

    //cue:path: "github.com/fluxcd/kustomize-controller/api/v1".#KustomizationKind
    let KUSTOMIZATIONKIND = {
      #x: "Kustomization"
    }

    //cue:path: "github.com/fluxcd/source-controller/api/v1".#GitRepositoryKind
    let GITREPOSITORYKIND = {
      #x: "GitRepository"
    }
  type: dockyards.io/cue
