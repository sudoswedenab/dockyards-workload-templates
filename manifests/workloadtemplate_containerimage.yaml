apiVersion: dockyards.io/v1alpha3
kind: WorkloadTemplate
metadata:
  name: container-image
spec:
  source: |
    package template

    import "encoding/yaml"

    #Input: {
      image!:   =~"^[a-z0-9]+((\\.|_|__|-+)[a-z0-9]+)*(/[a-z0-9]+((\\.|_|__|-+)[a-z0-9]+)*)*$"
      tag:      string & =~"^[a-zA-Z0-9_][a-zA-Z0-9._-]{0,127}$" | *"latest"
      replicas: int & >=0 | *1
      port?:    uint16
      host?:    string
    }
    #cluster:  CLUSTER.#x
    #workload: WORKLOAD.#x
    #workload: {
      spec: input: #Input
    }
    _namespace: NAMESPACE.#x & {
      apiVersion: "v1"
      kind:       "Namespace"
      metadata: name: #workload.spec.targetNamespace
    }
    _deployment: DEPLOYMENT.#x & {
      apiVersion: "apps/v1"
      kind:       "Deployment"
      metadata: {
        name:      #workload.metadata.name
        namespace: _namespace.metadata.name
      }
      spec: {
        replicas: #workload.spec.input.replicas
        selector: matchLabels: "app.kubernetes.io/name": #workload.metadata.name
        template: {
          metadata: labels: "app.kubernetes.io/name": #workload.metadata.name
          spec: containers: [{
            name:  #workload.metadata.name
            image: "\(#workload.spec.input.image):\(#workload.spec.input.tag)"
            if #workload.spec.input.port != _|_ // explicit error (_|_ literal) in source
            {
              ports: [{
                containerPort: #workload.spec.input.port
              }]
            }
          }]
        }
      }
    }
    _service: SERVICE.#x & {
      apiVersion: "v1"
      kind:       "Service"
      metadata: {
        name:      #workload.metadata.name
        namespace: _namespace.metadata.name
      }
      spec: {
        ports: [{
          port:       #workload.spec.input.port
          targetPort: #workload.spec.input.port
        }]
        selector: "app.kubernetes.io/name": #workload.metadata.name
      }
    }
    _ingress: INGRESS.#x & {
      apiVersion: "networking.k8s.io/v1"
      kind:       "Ingress"
      metadata: {
        name:      #workload.metadata.name
        namespace: _namespace.metadata.name
      }
      spec: rules: [{
        host: #workload.spec.input.host
        http: paths: [{
          path:     "/"
          pathType: PATHTYPEPREFIX.#x
          backend: service: {
            name: #workload.metadata.name
            port: number: #workload.spec.input.port
          }
        }]
      }]
    }
    _resources: {
      "namespace.yaml":  '\(yaml.Marshal(_namespace))'
      "deployment.yaml": '\(yaml.Marshal(_deployment))'
    }

    if #workload.spec.input.port != _|_ // explicit error (_|_ literal) in source
    {
      _resources: {
        "service.yaml": '\(yaml.Marshal(_service))'
      }

      if #workload.spec.input.host != _|_ // explicit error (_|_ literal) in source
      {
        _resources: {
          "ingress.yaml": '\(yaml.Marshal(_ingress))'
        }
      }
    }
    _kustomization: KUSTOMIZATION.#x & {
      resources: [
        for key, val in _resources {
          "\(key)"
        }]
    }
    worktree: WORKTREE.#x & {
      apiVersion: "dockyards.io/v1alpha3"
      kind:       WORKTREEKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: files: {
        {
          for key, val in _resources {
            "\(key)": val
          }
        }
        "kustomization.yaml": '\(yaml.Marshal(_kustomization))'
      }
    }
    kustomization: KUSTOMIZATION_1.#x & {
      apiVersion: "kustomize.toolkit.fluxcd.io/v1"
      kind:       KUSTOMIZATIONKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval: "5m"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        prune: true
        sourceRef: {
          kind: GITREPOSITORYKIND.#x
          name: worktree.metadata.name
        }
        targetNamespace: _namespace.metadata.name
      }
    }

