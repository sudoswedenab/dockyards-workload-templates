    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#Condition
    let CONDITION = {
      #x: {
        type:                string             @go(Type) @protobuf(1,bytes,opt)
        status:              CONDITIONSTATUS.#x @go(Status) @protobuf(2,bytes,opt)
        observedGeneration?: int64              @go(ObservedGeneration) @protobuf(3,varint,opt)
        lastTransitionTime:  TIME.#x            @go(LastTransitionTime) @protobuf(4,bytes,opt)
        reason:              string             @go(Reason) @protobuf(5,bytes,opt)
        message:             string             @go(Message) @protobuf(6,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ConditionStatus
    let CONDITIONSTATUS = {
