        time?:        TIME.#x                       @go(Time,*Time) @protobuf(4,bytes,opt)
        fieldsType?:  string                        @go(FieldsType) @protobuf(6,bytes,opt)
        fieldsV1?:    FIELDSV1.#x                   @go(FieldsV1,*FieldsV1) @protobuf(7,bytes,opt)
        subresource?: string                        @go(Subresource) @protobuf(8,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ManagedFieldsOperationType
    let MANAGEDFIELDSOPERATIONTYPE = {
      #x: string
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#FieldsV1
    let FIELDSV1 = {
