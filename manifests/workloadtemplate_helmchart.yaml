apiVersion: dockyards.io/v1alpha3
kind: WorkloadTemplate
metadata:
  name: helm-chart
spec:
  source: |
    package template

    import "strings"

    #Input: {
      chart!:      string
      repository!: =~"^(http?s|oci)://.*$"
      version!:    string
      values?: [string]: _
    }
    #cluster: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        version?:                  string @go(Version)
        noDefaultIngressProvider?: bool   @go(NoDefaultIngressProvider)
        upgrades?: [...{
          to: string @go(To)
        }] @go(Upgrades,[]ClusterUpgrade)
        blockDeletion?:          bool                                @go(BlockDeletion)
        allocateInternalIP?:     bool                                @go(AllocateInternalIP)
        ipPoolRef?:              null | TYPEDLOCALOBJECTREFERENCE.#x @go(IPPoolRef,*corev1.TypedLocalObjectReference)
        duration?:               null | DURATION.#x                  @go(Duration,*metav1.Duration)
        noDefaultNetworkPlugin?: bool                                @go(NoDefaultNetworkPlugin)
        podSubnets?: [...string] @go(PodSubnets,[]string)
        serviceSubnets?: [...string] @go(ServiceSubnets,[]string)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        clusterServiceID?: string @go(ClusterServiceID)
        version?:          string @go(Version)
        dnsZones?: [...string] @go(DNSZones,[]string)
        apiEndpoint?: {
          host: string @go(Host)
          port: int32  @go(Port)
        } @go(APIEndpoint)
        expirationTimestamp?: null | TIME.#x @go(ExpirationTimestamp,*metav1.Time)
      } @go(Status)
    }
    #workload: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        clusterComponent?:      bool                           @go(ClusterComponent)
        targetNamespace:        string                         @go(TargetNamespace)
        workloadTemplateInput?: null | JSON.#x                 @go(WorkloadTemplateInput,*apiextensionsv1.JSON)
        input?:                 null | JSON.#x                 @go(Input,*apiextensionsv1.JSON)
        workloadTemplateRef?:   null | TYPEDOBJECTREFERENCE.#x @go(WorkloadTemplateRef,*corev1.TypedObjectReference)
        provenience:            string                         @go(Provenience)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        dependencyRefs?: [...TYPEDLOCALOBJECTREFERENCE.#x] @go(DependencyRefs,[]corev1.TypedLocalObjectReference)
        urls?: [...string] @go(URLs,[]string)
        references?: [...{
          TYPEDOBJECTREFERENCE.#x
          parent?: null | TYPEDLOCALOBJECTREFERENCE.#x @go(Parent,*corev1.TypedLocalObjectReference)
          urls?: [...string] @go(URLs,[]string)
        }] @go(References,[]WorkloadReference)
      } @go(Status)
    } & {
      spec: input: #Input
    }
    helmRepository: HELMREPOSITORY.#x & {
      apiVersion: "source.toolkit.fluxcd.io/v1"
      kind:       HELMREPOSITORYKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval: "5m"
        url:      #workload.spec.input.repository
        if strings.HasPrefix(#workload.spec.input.repository, "oci://") {
          type: "oci"
        }
      }
    }
    helmRelease: HELMRELEASE.#x & {
      apiVersion: "helm.toolkit.fluxcd.io/v2"
      kind:       HELMRELEASEKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        chart: spec: {
          chart: #workload.spec.input.chart
          sourceRef: {
            kind: helmRepository.kind
            name: helmRepository.metadata.name
          }
          version: #workload.spec.input.version
        }
        install: {
          createNamespace: true
          remediation: retries: -1
        }
        interval: "5m"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        storageNamespace: #workload.spec.targetNamespace
        targetNamespace:  #workload.spec.targetNamespace
        if #workload.spec.input.values != _|_ // explicit error (_|_ literal) in source
        {
          values: #workload.spec.input.values
        }
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#TypeMeta
    let TYPEMETA = {
      #x: {
        kind?:       string @go(Kind) @protobuf(1,bytes,opt)
        apiVersion?: string @go(APIVersion) @protobuf(2,bytes,opt)
      }
