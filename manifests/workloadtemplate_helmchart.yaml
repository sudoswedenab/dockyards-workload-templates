        selfLink?:                   string  @go(SelfLink) @protobuf(4,bytes,opt)
        uid?:                        UID.#x  @go(UID) @protobuf(5,bytes,opt,casttype=k8s.io/kubernetes/pkg/types.UID)
        resourceVersion?:            string  @go(ResourceVersion) @protobuf(6,bytes,opt)
        generation?:                 int64   @go(Generation) @protobuf(7,varint,opt)
        creationTimestamp?:          TIME.#x @go(CreationTimestamp) @protobuf(8,bytes,opt)
        deletionTimestamp?:          TIME.#x @go(DeletionTimestamp,*Time) @protobuf(9,bytes,opt)
        deletionGracePeriodSeconds?: int64   @go(DeletionGracePeriodSeconds,*int64) @protobuf(10,varint,opt)
        labels?: {
          [string]: string
        } @go(Labels,map[string]string) @protobuf(11,bytes,rep)
        annotations?: {
          [string]: string
        } @go(Annotations,map[string]string) @protobuf(12,bytes,rep)
        ownerReferences?: [...OWNERREFERENCE.#x] @go(OwnerReferences,[]OwnerReference) @protobuf(13,bytes,rep)
        finalizers?: [...string] @go(Finalizers,[]string) @protobuf(14,bytes,rep)
        managedFields?: [...MANAGEDFIELDSENTRY.#x] @go(ManagedFields,[]ManagedFieldsEntry) @protobuf(17,bytes,rep)
      }
    }

