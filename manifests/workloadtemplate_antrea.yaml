apiVersion: dockyards.io/v1alpha3
kind: WorkloadTemplate
metadata:
  name: antrea
spec:
  source: |
    package template

    import (
      "encoding/yaml"
      "strings"
    )

    #ExternalIPPool: {
      name: string
      cidr: string
      nodeSelectorLabels: [key=string]: string
    }
    #bgpPolicy: {
      name: string
      bgpPeers: [...#bgpPeer]
      listenPort: int
      localASN:   int
      nodeSelectorLabels: [key=string]: string
    }
    #bgpPeer: {
      name:                       string
      address:                    string
      asn:                        int
      gracefulRestartTimeSeconds: int
      multihopTTL:                int
      port:                       int
    }
    #Input: {
      chart:      string | *"antrea"
      repository: string & =~"^(http?s|oci)://.*$" | *"https://charts.antrea.io"
      version:    string | *"2.5.0"
      agentFeatureGates: {
        [key=string]: bool
      } | *{}
      controllerFeatureGates: {
        [key=string]: bool
      } | *{}
      externalIPPools: [...#ExternalIPPool] | *[]
      BGPPolicies: [...#bgpPolicy] | *[]
    }
    #cluster: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        version?:                  string @go(Version)
        noDefaultIngressProvider?: bool   @go(NoDefaultIngressProvider)
        upgrades?: [...{
          to: string @go(To)
        }] @go(Upgrades,[]ClusterUpgrade)
        blockDeletion?:          bool                                @go(BlockDeletion)
        allocateInternalIP?:     bool                                @go(AllocateInternalIP)
        ipPoolRef?:              null | TYPEDLOCALOBJECTREFERENCE.#x @go(IPPoolRef,*corev1.TypedLocalObjectReference)
        duration?:               null | DURATION.#x                  @go(Duration,*metav1.Duration)
        noDefaultNetworkPlugin?: bool                                @go(NoDefaultNetworkPlugin)
        podSubnets?: [...string] @go(PodSubnets,[]string)
        serviceSubnets?: [...string] @go(ServiceSubnets,[]string)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        clusterServiceID?: string @go(ClusterServiceID)
        version?:          string @go(Version)
        dnsZones?: [...string] @go(DNSZones,[]string)
        apiEndpoint?: {
          host: string @go(Host)
          port: int32  @go(Port)
        } @go(APIEndpoint)
        expirationTimestamp?: null | TIME.#x @go(ExpirationTimestamp,*metav1.Time)
      } @go(Status)
    }
    #workload: {
      TYPEMETA.#x
      metadata?: OBJECTMETA.#x @go(ObjectMeta)
      spec?: {
        clusterComponent?:      bool                           @go(ClusterComponent)
        targetNamespace:        string                         @go(TargetNamespace)
        workloadTemplateInput?: null | JSON.#x                 @go(WorkloadTemplateInput,*apiextensionsv1.JSON)
        input?:                 null | JSON.#x                 @go(Input,*apiextensionsv1.JSON)
        workloadTemplateRef?:   null | TYPEDOBJECTREFERENCE.#x @go(WorkloadTemplateRef,*corev1.TypedObjectReference)
        provenience:            string                         @go(Provenience)
      } @go(Spec)
      status?: {
        conditions?: [...CONDITION.#x] @go(Conditions,[]metav1.Condition)
        dependencyRefs?: [...TYPEDLOCALOBJECTREFERENCE.#x] @go(DependencyRefs,[]corev1.TypedLocalObjectReference)
        urls?: [...string] @go(URLs,[]string)
        references?: [...{
          TYPEDOBJECTREFERENCE.#x
          parent?: null | TYPEDLOCALOBJECTREFERENCE.#x @go(Parent,*corev1.TypedLocalObjectReference)
          urls?: [...string] @go(URLs,[]string)
        }] @go(References,[]WorkloadReference)
      } @go(Status)
    } & {
      spec: input: #Input
    }
    _config_agent: {
      featureGates: #workload.spec.input.agentFeatureGates
    }
    _config_controller: {
      featureGates: #workload.spec.input.controllerFeatureGates
    }
    _namespace: NAMESPACE.#x & {
      apiVersion: "v1"
      kind:       "Namespace"
      metadata: {
        name: #workload.spec.targetNamespace
        labels: {
          "pod-security.kubernetes.io/audit":           "privileged"
          "pod-security.kubernetes.io/audit-version":   "latest"
          "pod-security.kubernetes.io/enforce":         "privileged"
          "pod-security.kubernetes.io/enforce-version": "latest"
          "pod-security.kubernetes.io/warn":            "privileged"
          "pod-security.kubernetes.io/warn-version":    "latest"
        }
      }
    }
    _configMap: CONFIGMAP.#x & {
      apiVersion: "v1"
      kind:       "ConfigMap"
      metadata: {
        name:      "antrea-config"
        namespace: #workload.spec.targetNamespace
      }
      data: {
        if #workload.spec.input.agentFeatureGates != _|_ // explicit error (_|_ literal) in source
        {
          "antrea-agent.conf": "\(yaml.Marshal(_config_agent))"
        }
        if #workload.spec.input.controllerFeatureGates != _|_ // explicit error (_|_ literal) in source
        {
          "antrea-controller.conf": "\(yaml.Marshal(_config_controller))"
        }
      }
    }
    _externalIPPoolList: [
      for externalIPPool in #workload.spec.input.externalIPPools {
        EXTERNALIPPOOL.#x
        apiVersion: "crd.antrea.io/v1beta1"
        kind:       "ExternalIPPool"
        metadata: name: externalIPPool.name
        spec: {
          ipRanges: [{
            cidr: externalIPPool.cidr
          }]
          nodeSelector: matchLabels: {
            for k, v in externalIPPool.nodeSelectorLabels {
              (k): v
            }
          }
        }
      }]
    _bgpPolicyList: [
      for bgpPolicy in #workload.spec.input.BGPPolicies {
        apiVersion: "crd.antrea.io/v1beta1"
        kind:       "BGPPolicy"
        metadata: name: bgpPolicy.name
        spec: {
          advertisements: {
            egress: {}
            service: ipTypes: ["LoadBalancerIP"]
          }
          bgpPeers:   bgpPolicy.bgpPeers
          listenPort: bgpPolicy.listenPort
          localASN:   bgpPolicy.localASN
          nodeSelector: matchLabels: {
            for k, v in bgpPolicy.nodeSelectorLabels {
              (k): v
            }
          }
        }
      }]
    worktree: WORKTREE.#x & {
      apiVersion: "dockyards.io/v1alpha3"
      kind:       WORKTREEKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: files: {
        "namespace.yaml": '\(yaml.Marshal(_namespace))'
        if _externalIPPoolList != [] {
          "externalippools.yaml": '\(strings.Join([
                                  for externalIPPool in _externalIPPoolList {
              "\(yaml.Marshal(externalIPPool))"
            }], """

            ---

            """))'
        }
        if _bgpPolicyList != [] {
          "bgppolicies.yaml": '\(strings.Join([
                              for bgpPolicy in _bgpPolicyList {
              "\(yaml.Marshal(bgpPolicy))"
            }], """

            ---

            """))'
        }
      }
    }
    kustomization: KUSTOMIZATION.#x & {
      apiVersion: "kustomize.toolkit.fluxcd.io/v1"
      kind:       KUSTOMIZATIONKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval: "5m"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        prune: true
        sourceRef: {
          kind: GITREPOSITORYKIND.#x
          name: #workload.metadata.name
        }
      }
    }
    helmRepository: HELMREPOSITORY.#x & {
      apiVersion: "source.toolkit.fluxcd.io/v1"
      kind:       HELMREPOSITORYKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        interval: "5m"
        url:      #workload.spec.input.repository
        if strings.HasPrefix(#workload.spec.input.repository, "oci://") {
          type: "oci"
        }
      }
    }
    _values: JSON.#x & {
      agent: {
        dontLoadKernelModules: true
        installCNI: securityContext: capabilities: []
      }
    }
    helmRelease: HELMRELEASE.#x & {
      apiVersion: "helm.toolkit.fluxcd.io/v2"
      kind:       HELMRELEASEKIND.#x
      metadata: {
        name:      #workload.metadata.name
        namespace: #workload.metadata.namespace
      }
      spec: {
        chart: spec: {
          chart:   #workload.spec.input.chart
          version: #workload.spec.input.version
          sourceRef: {
            kind: helmRepository.kind
            name: helmRepository.metadata.name
          }
        }
        install: remediation: retries: -1
        interval: "5m"
        kubeConfig: secretRef: name: #cluster.metadata.name + "-kubeconfig"
        storageNamespace: #workload.spec.targetNamespace
        targetNamespace:  #workload.spec.targetNamespace
        values:           _values
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#TypeMeta
    let TYPEMETA = {
      #x: {
        kind?:       string @go(Kind) @protobuf(1,bytes,opt)
        apiVersion?: string @go(APIVersion) @protobuf(2,bytes,opt)
      }
    }

    //cue:path: "k8s.io/apimachinery/pkg/apis/meta/v1".#ObjectMeta
